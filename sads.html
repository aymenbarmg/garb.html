<body>
    <div id="loginScreen" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:20px;
overflow:auto;
">

<h2 style="text-align:center">
🔐 إنشاء حساب أو تسجيل دخول
</h2>

<input id="username"
placeholder="اسم المستخدم">

<input id="password"
type="password"
placeholder="كلمة المرور">

<button onclick="registerUser()"
style="width:100%;background:#4caf50;color:white;padding:12px;">
إنشاء حساب
</button>

style="width:100%;background:#1565c0;color:white;padding:12px;">

</div>
<button id="settingsBtn" onclick="openSettings()">
⚙️

</button>
<h1>📚 مساعد طالب السادس العلمي</h1>
<h1>𝓐𝔂𝓶𝓪𝓷</h1>
<details class="subjectsBox">
<summary>📚 المواد</summary>
<div id="subjects"></div>
</details>

<div id="result"></div>
<button class="generate" onclick="openNotes()">
📝 ملاحظات المواد
</button>
<div id="bottomButtons">
<button class="generate" onclick="generateSchedule()">
إنشاء الجدول الذكي
</button>

<button class="generate" onclick="generateRoutine()">
📅 إنشاء روتين يومي
</button>

<button class="clearBtn" onclick="clearAll()">
🗑 حذف كل شيء
</button>
</div>

<script>
    function openSettings(){

const darkMode =
confirm(
"🌙 تفعيل الوضع الليلي؟\n\nاضغط موافق للتفعيل أو إلغاء للإبقاء على الوضع الحالي.\n\n📞 07701046271\n💬 Telegram: Aot_121"
);

if(darkMode){

document.body.classList.toggle("darkMode");

localStorage.setItem(
"darkMode",
document.body.classList.contains("darkMode")
);

}

}
    
    function formatTime12h(time24){
let [h, m] = time24.split(":");
h = parseInt(h);

if(isNaN(h)) return "";

let period = h >= 12 ? "مساءً" : "صباحاً";

h = h % 12;
if(h === 0) h = 12;

return `${h}:${m} ${period}`;
}
function generateRoutine(){

const days = [
"السبت","الأحد","الإثنين",
"الثلاثاء","الأربعاء",
"الخميس","الجمعة"
];

let html = "<h2>📅 الروتين اليومي</h2>";

days.forEach(day=>{

let count =
document.querySelectorAll(
`.event .day`
);

html += `
<div class="dayCard">
<h2 class="dayTitle">${day}</h2>

<ul>
<li>🌅 الاستيقاظ: 6:00 صباحاً</li>
<li>🍳 الفطور: 6:30 صباحاً</li>
<li>📚 دراسة: 7:00 صباحاً</li>
<li>☕ استراحة: 10:00 صباحاً</li>
<li>📖 دراسة: 10:30 صباحاً</li>
<li>🍽 الغداء: 1:00 ظهراً</li>
<li>😴 راحة: 2:00 ظهراً</li>
<li>📚 دراسة: 4:00 عصراً</li>
<li>🍴 العشاء: 8:00 مساءً</li>
<li>🛏 النوم: 10:30 مساءً</li>
</ul>

</div>
`;

});

document.getElementById("result").innerHTML = html;

saveData();

}
const subjects = [
"العربي",
"الإنكليزي",
"الرياضيات",
"الفيزياء",
"الكيمياء",
"الأحياء",
"الإسلامية"
];

const subjectsContainer =
document.getElementById("subjects");

function loadSubjects(){

subjectsContainer.innerHTML="";

subjects.forEach((name,index)=>{

subjectsContainer.innerHTML += `
<div class="subject">

<h2>${name}</h2>

<label>
<input type="checkbox" id="registered${index}">
مسجل في معهد
</label>

<input
id="institute${index}"
placeholder="اسم المعهد">

<div id="events${index}"></div>

<button
class="addLecture"
onclick="addLecture(${index})">
➕ محاضرة
</button>

<button
class="addOnline"
onclick="addOnlineExam(${index})">
💻 إلكتروني
</button>

<button
class="addExam"
onclick="addPhysicalExam(${index})">
📝 حضوري
</button>

</div>
`;

});

}

function createEventHTML(type){

return `
<div class="event">

<b>${type}</b>

<select class="day">
<option>السبت</option>
<option>الأحد</option>
<option>الإثنين</option>
<option>الثلاثاء</option>
<option>الأربعاء</option>
<option>الخميس</option>
<option>الجمعة</option>
</select>

<input type="time" class="startTime">
<input type="time" class="endTime">

<button
class="deleteBtn"
onclick="this.parentElement.remove();saveData();">
حذف
</button>

</div>
`;

}function addLecture(i){

document
.getElementById(`events${i}`)
.insertAdjacentHTML(
"beforeend",
createEventHTML("🎓 محاضرة")
);

saveData();

}

function addOnlineExam(i){

document
.getElementById(`events${i}`)
.insertAdjacentHTML(
"beforeend",
createEventHTML("💻 إلكتروني")
);

saveData();

}

function addPhysicalExam(i){

document
.getElementById(`events${i}`)
.insertAdjacentHTML(
"beforeend",
createEventHTML("📝 حضوري")
);

saveData();

}
/* حفظ البيانات */
function saveData(){

let allData = [];

subjects.forEach((subject,index)=>{

let events = [];

document
.querySelectorAll(`#events${index} .event`)
.forEach(ev=>{

events.push({
type: ev.querySelector("b").innerText,
day: ev.querySelector(".day").value,
start: ev.querySelector(".startTime").value,
end: ev.querySelector(".endTime").value
});

});

allData.push({
registered:
document.getElementById(`registered${index}`)?.checked || false,

institute:
document.getElementById(`institute${index}`)?.value || "",

events
});

});

const data = {
subjectsData: allData,
scheduleHTML:
document.getElementById("result").innerHTML
};

localStorage.setItem(
"studyApp",
JSON.stringify(data)
);

}

/* تحميل البيانات */
function loadData(){

const saved =
localStorage.getItem("studyApp");

if(!saved) return;

const data =
JSON.parse(saved);

if(data.subjectsData){

data.subjectsData.forEach((sub,index)=>{

const reg =
document.getElementById(`registered${index}`);

const inst =
document.getElementById(`institute${index}`);

if(reg) reg.checked = sub.registered;
if(inst) inst.value = sub.institute;

const container =
document.getElementById(`events${index}`);

container.innerHTML = "";

sub.events.forEach(ev=>{

container.insertAdjacentHTML(
"beforeend",
createEventHTML(ev.type)
);

const last =
container.lastElementChild;

last.querySelector(".day").value =
ev.day;

last.querySelector(".startTime").value =
ev.start;

last.querySelector(".endTime").value =
ev.end;

});

});

}

document.getElementById("result").innerHTML =
data.scheduleHTML || "";

}

/* حذف الكل */
function clearAll(){

if(confirm("هل تريد حذف كل البيانات؟")){

localStorage.removeItem("studyApp");

location.reload();

}

}

/* إنشاء الجدول */
function generateSchedule(){

const days = [
"السبت",
"الأحد",
"الإثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة"
];

let week = {};

days.forEach(day=>{
week[day]=[];
});

subjects.forEach((subject,index)=>{

document
.querySelectorAll(`#events${index} .event`)
.forEach(ev=>{

week[
ev.querySelector(".day").value
].push({

subject,

type:
ev.querySelector("b").innerText,

start:
ev.querySelector(".startTime").value,

end:
ev.querySelector(".endTime").value

});

});

});

let html="";

days.forEach(day=>{

html += `
<div class="dayCard">

<h2 class="dayTitle">
${day}
</h2>

<ul>
`;

week[day].sort(
(a,b)=>
a.start.localeCompare(b.start)
);

if(week[day].length===0){

html += `
<li>
📖 مراجعة عامة
</li>
`;

}

week[day].forEach(item=>{

if(item.type.includes("محاضرة")){

html += `
<li class="lecture">
${formatTime12h(item.start)} - ${formatTime12h(item.end)}
${item.type}
${item.subject}
</li>
`;

}

if(item.type.includes("إلكتروني")){

html += `
<li class="online">
${formatTime12h(item.start)} - ${formatTime12h(item.end)}
${item.type}
${item.subject}
</li>
`;

}
if(item.type.includes("حضوري")){

html += `
<li class="exam">
${formatTime12h(item.start)} - ${formatTime12h(item.end)}
${item.type}
${item.subject}
</li>
`;

}
});

html += `
</ul>
</div>
`;

});

document.getElementById("result").innerHTML =
html;

/* حفظ الجدول تلقائياً */
saveData();

}

/* حفظ تلقائي عند أي تعديل */
document.addEventListener(
"change",
saveData
);

/* تشغيل */
if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("darkMode");
}
loadSubjects();
loadData();
let currentNoteIndex = null;
function registerUser(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

if(!username || !password){
alert("أدخل اسم المستخدم وكلمة المرور");
return;
}

localStorage.setItem("currentUser", username);

alert("تم إنشاء الحساب");

document.getElementById("loginScreen").style.display="none";

}

function loginUser(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

if(!username || !password){
alert("أدخل اسم المستخدم وكلمة المرور");
return;
}

localStorage.setItem("currentUser", username);

document.getElementById("loginScreen").style.display="none";

}

window.addEventListener("load",()=>{

const user =
localStorage.getItem("currentUser");

if(user){
document.getElementById("loginScreen").style.display="none";
}

});
function openNotes(){

document.getElementById("notesModal").style.display = "block";

let html = "";

subjects.forEach((s,i)=>{

html += `
<button onclick="selectSubjectNote(${i})"
style="width:100%;margin:5px;padding:10px;">
${s}
</button>
`;

});

document.getElementById("notesSubjects").innerHTML = html;

}

function selectSubjectNote(i){

currentNoteIndex = i;

const data = JSON.parse(localStorage.getItem("studyApp")) || {};

document.getElementById("noteText").value =
(data.notes && data.notes[i]) ? data.notes[i] : "";

}

function saveNote(){

const text = document.getElementById("noteText").value;

let data = JSON.parse(localStorage.getItem("studyApp")) || {};

if(!data.notes) data.notes = {};

data.notes[currentNoteIndex] = text;

localStorage.setItem("studyApp", JSON.stringify(data));

alert("تم الحفظ ✔️");
}

function closeNotes(){
document.getElementById("notesModal").style.display = "none";
}
</script>
